<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список задач</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Список задач</h1>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Новая задача..." maxlength="100">
            <select id="categorySelect">
                <option value="work">Работа</option>
                <option value="personal">Личное</option>
                <option value="study">Учёба</option>
            </select>
            <button id="addBtn">Добавить</button>
        </div>

        <div class="filters">
            <button id="allFilter" class="filter-btn active">Все</button>
            <button id="workFilter" class="filter-btn">Работа</button>
            <button id="personalFilter" class="filter-btn">Личное</button>
            <button id="studyFilter" class="filter-btn">Учёба</button>
        </div>

        <ul id="taskList"></ul>

        <div class="stats">
            <span id="statsText">Задач: 0</span>
            <button id="clearCompleted">Очистить выполненные</button>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/dom.js"></script>
    <script src="js/events.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
